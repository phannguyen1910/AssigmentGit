<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Nút Xin Chào</title>
    <script>
        function sayHello() {
            document.getElementById("message").innerText = "Xin chào 👋";
        }
    </script>
</head>
<body>
    <h2>Demo nút bấm</h2>
    <button onclick="sayHello()">Nhấn để chào</button>
    <p id="message"></p>
</body>
</html>
